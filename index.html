<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PTM Nano Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>PTM Nano 3.0</h2>
    <input type="number" id="tonnage" placeholder="Tonnage (T)">
    <input type="number" id="marge" placeholder="Marge (%)">
    <button onclick="calculer()">Calculer Performance</button>
    <div id="result"></div>
</div>

<script>
    function calculer() {
        const tonnage = document.getElementById('tonnage').value;
        const marge = document.getElementById('marge').value;
        const res = (tonnage * marge) / 100;
        document.getElementById('result').innerText = "Résultat Optimisation: " + res.toFixed(2) + " T";
    }
</script>

</body>
</html>
